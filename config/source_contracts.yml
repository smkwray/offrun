sibling_sources:
  tdcladder:
    required: true
    role: maturity and liquidity ladder context; TRACE turnover precedents
    artifacts:
      - name: liquidity_weighted_treasury_supply_by_bucket
        source_path: data/clean/liquidity_weighted_treasury_supply_by_bucket.csv
        import_path: data/imported/tdcladder/source_liquidity_weighted_treasury_supply_by_bucket.csv
        required: true
        required_columns:
          - month
          - maturity_bucket
          - supply_basis
          - treasury_supply_raw
          - liquidity_weight
          - liquid_treasury_supply
      - name: trace_turnover_by_maturity
        source_path: data/raw/market_liquidity/turnover_by_maturity.csv
        import_path: data/imported/tdcladder/source_trace_turnover_by_maturity.csv
        required: true
        required_columns:
          - month
          - security_type
          - trace_volume
          - outstanding_amount
          - turnover
  buycurve:
    required: true
    role: Treasury issuance composition and maturity context
    artifacts:
      - name: monthly_issuance_maturity_panel
        source_path: data/clean/monthly_issuance_maturity_panel.csv
        import_path: data/imported/buycurve/source_monthly_issuance_maturity_panel.csv
        required: true
        required_columns:
          - month
          - security_type
          - maturity_bucket
          - accepted_amount_sum
          - weighted_maturity_years
      - name: primary_dealer_context_clean
        source_path: data/interim/primary_dealer_context_clean.csv
        import_path: data/imported/buycurve/source_primary_dealer_context_clean.csv
        required: true
        required_columns:
          - as_of_date
          - measure
          - remaining_maturity_bucket
          - value
      - name: primary_dealer_timeseries
        source_path: data/raw/validation/primary_dealer/pd_timeseries.csv
        import_path: data/imported/buycurve/source_primary_dealer_timeseries.csv
        required: true
        required_columns:
          - As Of Date
          - Time Series
          - Value (millions)
  liqsub:
    required: true
    role: liquidity-plumbing diagnostics for interpretation sidecars
    artifacts:
      - name: monthly_liquidity_substitution_panel
        source_path: data/clean/monthly_liquidity_substitution_panel.csv
        import_path: data/imported/liqsub/source_monthly_liquidity_substitution_panel.csv
        required: true
        required_columns:
          - month
          - tga
          - reserves
          - total_mmf_assets
          - on_rrp
  rowflow:
    required: false
    role: optional rest-of-world Treasury absorption context only if useful
    artifacts:
      - name: rowflow_panel
        source_path: data/derived/rowflow_panel.csv
        import_path: data/imported/rowflow/rowflow_panel.csv
        required: false
        required_columns:
          - month
          - tic_foreign_official_treasury_net_flow_usd_millions
          - tic_foreign_private_treasury_net_flow_usd_millions

public_sources:
  treasury_buybacks_fiscaldata:
    priority: primary
    role: Treasury buyback operations, announcements, and results
    url: https://fiscaldata.treasury.gov/datasets/treasury-securities-buybacks/
    local_raw_path: data/raw/fiscaldata/treasury_securities_buybacks.csv
    required_columns:
      - operation_date
      - security_type
      - maturity_bucket
      - offered_amount_usd_millions
      - accepted_amount_usd_millions
  treasurydirect_buybacks:
    priority: primary
    role: buyback announcements, schedules, operation-level results, and FAQ context
    url: https://treasurydirect.gov/auctions/announcements-data-results/buy-backs/
    local_raw_path: data/raw/treasurydirect/buyback_announcements_results.csv
  finra_trace_treasury_aggregates:
    priority: primary_public_aggregate_only
    role: public aggregate Treasury volume and turnover proxies; not CUSIP-level liquidity
    url: https://www.finra.org/filing-reporting/trace/data/trace-treasury-aggregates/about
    local_raw_path: data/raw/trace/trace_treasury_aggregates.csv
    required_columns:
      - date
      - maturity_bucket
      - trading_volume_usd_millions
      - outstanding_usd_millions
  nyfed_primary_dealer_statistics:
    priority: primary
    role: weekly positions, transactions, financing, and fails diagnostics
    url: https://www.newyorkfed.org/markets/counterparties/primary-dealers-statistics
    local_raw_path: data/raw/nyfed/primary_dealer_statistics.csv
    required_columns:
      - date
      - maturity_bucket
      - net_positions_usd_millions
      - financing_usd_millions
      - fails_to_deliver_usd_millions
      - fails_to_receive_usd_millions
  h15_gsw_controls:
    priority: optional_control
    role: yield and rate controls only if needed
    urls:
      - https://www.federalreserve.gov/releases/h15/
      - https://www.federalreserve.gov/data/yield-curve-models.htm
